<transition name="fade">
  <div id="unlockCalculator" :class="['unlock-calculator-popup', popupClass]" v-cloak>
    <div class="popup popup--fadeIn">
      <div v-if="userType === ''" class="content">
        <img src="/images/unlock-calculator.png" alt="Unlock Calculator Banner">
        <div class="content-group">
          <div class="header">
            <h1 class="title">Unlock Calculator</h1>
            <p class="subtext">What represents you best?</p>
          </div>
          <div class="cta">
            <button class="btn btn-outline" @click="setUserType('creator')">Influencer / Creator</button>
            <button class="btn" @click="setUserType('brand')">Brand / Marketer</button>
          </div>
        </div>
      </div>
      <div v-if="userType === 'creator'">
        {{ partial "site/showcase-popup.html" }}
      </div>
      <div v-if="userType === 'brand'" class="content">
        <h4 class="title">Title</h4>
        <p class="subtext">Subtext</p>
        <pre v-if="subscriptionError" class="subscriptionError">{ subscriptionError }</pre>
        <input v-model="email" type="text" id="email" name="email">
        <div class="cta">
          <button @click="handleSubscription" class="btn btn-lg" title="Get started">
            Subscribe to beehiiv
          </button>
        </div>
      </div>
    </div>
  </div>
</transition>
